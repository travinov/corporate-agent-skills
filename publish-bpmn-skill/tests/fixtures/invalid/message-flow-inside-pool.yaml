schema_version: 2
definitions:
  id: message-flow-inside-pool-definitions
  name: Message Flow Inside Pool
processes:
  - id: company-process
    name: Company Process
    nodes:
      - id: start
        type: startEvent
        name: Start
      - id: send-message
        type: sendTask
        name: Send message
      - id: receive-message
        type: receiveTask
        name: Receive message
      - id: end
        type: endEvent
        name: End
    flows:
      - id: flow1
        from: start
        to: send-message
      - id: flow2
        from: receive-message
        to: end
participants:
  - id: company
    name: Company
    process_ref: company-process
message_flows:
  - id: message1
    from: send-message
    to: receive-message
