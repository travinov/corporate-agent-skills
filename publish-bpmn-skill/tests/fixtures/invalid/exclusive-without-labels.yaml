schema_version: 1
process:
  id: exclusive-without-labels
  name: Exclusive Without Labels
nodes:
  - id: start
    type: startEvent
    name: Start
  - id: decide
    type: exclusiveGateway
    name: Valid?
  - id: end1
    type: endEvent
    name: End One
  - id: end2
    type: endEvent
    name: End Two
flows:
  - id: flow1
    from: start
    to: decide
  - id: flow2
    from: decide
    to: end1
  - id: flow3
    from: decide
    to: end2
