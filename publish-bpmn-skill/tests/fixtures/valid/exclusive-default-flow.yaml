schema_version: 1
process:
  id: exclusive-default-flow
  name: Exclusive Default Flow
nodes:
  - id: start
    type: startEvent
    name: Start
  - id: choose-route
    type: exclusiveGateway
    name: Which route?
    default: flow-other
  - id: handle-known
    type: task
    name: Process known route
  - id: handle-other
    type: task
    name: Process other route
  - id: end
    type: endEvent
    name: End
flows:
  - id: flow-start-choice
    from: start
    to: choose-route
  - id: flow-known
    from: choose-route
    to: handle-known
    condition:
      body: route == "known"
  - id: flow-other
    from: choose-route
    to: handle-other
  - id: flow-known-end
    from: handle-known
    to: end
  - id: flow-other-end
    from: handle-other
    to: end
