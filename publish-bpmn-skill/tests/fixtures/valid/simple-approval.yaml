schema_version: 1
process:
  id: simple-approval
  name: Simple Approval
  executable: false
  target_engine: none
participants:
  - id: company
    name: Company
    lanes:
      - id: requester
        name: Requester
      - id: approver
        name: Approver
nodes:
  - id: start
    type: startEvent
    name: Request submitted
    lane: requester
  - id: submit-request
    type: userTask
    name: Submit request
    lane: requester
  - id: approve-request
    type: userTask
    name: Approve request
    lane: approver
  - id: approved
    type: endEvent
    name: Approved
    lane: approver
flows:
  - id: flow1
    from: start
    to: submit-request
  - id: flow2
    from: submit-request
    to: approve-request
  - id: flow3
    from: approve-request
    to: approved
message_flows: []
documentation:
  purpose: Simple approval fixture.
